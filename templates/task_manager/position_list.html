{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <h1>Position List
  <a style="float: inline-end" href="{% url 'task_manager:position-create' %}">+</a>
  </h1>

  {% if position_list %}
    <table class="table">
      <tr>
        <th>ID</th>
        <th>Name</th>
      </tr>

      {% for position in position_list %}
        <tr>
          <td>
            <a href="{% url 'task_manager:position-detail' pk=position.id %}"> {{ position.id }}</a>
          </td>
          <td>
              {{ position.name }}
          </td>
        </tr>
      {% endfor %}
    </table>

  {% else %}
      <p>There are no manufacturers in the service.</p>
  {% endif %}
{% endblock %}
