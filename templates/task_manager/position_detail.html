{% extends "base.html" %}

{% block content %}
  <h1>
    {{ position.name }}
  </h1>
  <h3>
    Workers
  </h3>
  <hr>
  <ul>
    {% for worker in position.workers.all %}
      <li>{{ worker.username }} ({{ worker.first_name }} {{ worker.last_name }})</li>
    {% endfor %}
  </ul>

  <form action="{% url 'task_manager:position-delete' pk=position.id %}">
    <a class="btn btn-primary" href="{% url 'task_manager:position-update' pk=position.id %}">Update</a>
    <button type="submit" class="btn btn-danger">Delete</button>
  </form>
{% endblock %}
