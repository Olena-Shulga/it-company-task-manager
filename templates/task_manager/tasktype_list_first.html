{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <h1>
    Task Type List
    <a style="float: inline-end" href="{% url 'task_manager:task-type-create' %}">+</a>
  </h1>

  {% if tasktype_list %}
    <table class="table">
      <tr>
        <th>ID</th>
        <th>Name</th>
      </tr>

      {% for type in tasktype_list %}
        <tr>
          <td>
              <a href="{% url 'task_manager:task-type-detail' pk=type.id %}">{{ type.id }}</a>
          </td>
          <td>
              {{ type.name }}
          </td>
        </tr>
      {% endfor %}
    </table>

  {% else %}
      <p>There are no task types added yet.</p>
  {% endif %}
{% endblock %}
