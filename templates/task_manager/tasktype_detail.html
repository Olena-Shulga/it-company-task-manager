{% extends "base.html" %}

{% block content %}
  <h1>
    {{ tasktype.name }}
  </h1>
  <form action="{% url 'task_manager:task-type-delete' pk=tasktype.id %}">

    <button type="submit" class="btn btn-danger">Delete</button>
  </form>
{% endblock %}
